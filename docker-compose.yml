version: '3.8'

services:
  database:
    image: postgis/postgis:15-3.3
    container_name: InvesTree_db
    environment:
      POSTGRES_USER: InvesTree
      POSTGRES_PASSWORD: InvesTree_password
      POSTGRES_DB: InvesTree_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
